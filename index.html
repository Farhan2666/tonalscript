<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TonalScript</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>TonalScript</h1>
      <p class="tagline">Write Text, Hear Music – Instantly.</p>
    </header>

    <main>
      <div class="ai-section">
        <div class="ai-header">
          <span class="ai-icon">🤖</span>
          <span>AI Music Assistant</span>
          <span id="aiStatus" class="ai-status">No API Key</span>
          <button id="settingsBtn" class="settings-btn-inline" aria-label="Settings">⚙️ API Key</button>
        </div>
        <div class="ai-input-row">
          <input 
            type="text" 
            id="aiPrompt" 
            placeholder="Describe the music you want (e.g., 'calm forest morning')"
            aria-label="AI music prompt"
          >
          <select id="aiGenre">
            <option value="ambient">Ambient</option>
            <option value="gamelan">Gamelan</option>
            <option value="koto">Koto</option>
            <option value="shamisen">Shamisen</option>
            <option value="cinematic">Cinematic</option>
            <option value="lofi">Lo-Fi</option>
            <option value="electronic">Electronic</option>
            <option value="traditional">Traditional</option>
          </select>
          <button id="aiGenerateBtn" disabled>Generate</button>
        </div>
        <div id="aiError" class="error-message"></div>
      </div>

      <div class="input-section">
        <textarea 
          id="notationInput" 
          placeholder="DA:4, MI:2, NA:1"
          aria-label="Music notation input"
        ></textarea>
        <div id="inputError" class="error-message"></div>
      </div>

      <div class="control-bar">
        <div class="preset-section">
          <label for="presetSelect">Sound:</label>
          <select id="presetSelect">
            <optgroup label="Traditional">
              <option value="gamelan">Gamelan</option>
              <option value="koto">Koto</option>
              <option value="shamisen">Shamisen</option>
            </optgroup>
            <optgroup label="Modern">
              <option value="ambient">Ambient</option>
              <option value="cinematic">Cinematic</option>
              <option value="lofi">Lo-Fi</option>
              <option value="electronic">Electronic</option>
              <option value="traditional">Traditional</option>
            </optgroup>
          </select>
        </div>

        <div class="bpm-section">
          <label for="bpmSlider">BPM: <span id="bpmValue">120</span></label>
          <input 
            type="range" 
            id="bpmSlider" 
            min="40" 
            max="240" 
            value="120"
          >
        </div>

        <div class="playback-controls">
          <button id="playBtn" disabled aria-label="Play">▶</button>
          <button id="pauseBtn" disabled aria-label="Pause">⏸</button>
          <button id="stopBtn" disabled aria-label="Stop">⏹</button>
        </div>

        <div class="export-section">
          <button id="exportBtn" disabled aria-label="Export WAV">💾 Export</button>
        </div>
      </div>
    </main>

    <div id="exportModal" class="modal hidden">
      <div class="modal-content">
        <h2>Export Audio</h2>
        <div class="duration-section">
          <label for="durationSlider">Duration: <span id="durationValue">30</span>s</label>
          <input type="range" id="durationSlider" min="10" max="60" value="30">
        </div>
        <div class="modal-actions">
          <button id="cancelExport">Cancel</button>
          <button id="confirmExport">Download</button>
        </div>
      </div>
    </div>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h2>⚙️ Settings</h2>
        <div class="settings-section">
          <label for="apiKeyInput">OpenRouter API Key (BYOK):</label>
          <p class="hint">Get free key at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></p>
          <div class="api-key-row">
            <input 
              type="password" 
              id="apiKeyInput" 
              placeholder="sk-or-v1-..."
            >
            <button id="toggleKeyVisibility">👁️</button>
          </div>
        </div>
        <div class="settings-section">
          <label for="modelSelect">AI Model:</label>
          <select id="modelSelect">
            <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B (Free)</option>
            <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
            <option value="qwen/qwen3-coder:free">Qwen3 Coder (Free)</option>
          </select>
        </div>
        <div class="modal-actions">
          <button id="cancelSettings">Cancel</button>
          <button id="saveSettings">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
